<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubo · Commandes — Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #F5F4F9;
  --white: #ffffff;
  --ink: #1A1A1A;
  --dark: #333333;
  --muted: #999999;
  --light-text: #BBBBBB;
  --border: #E0E0E0;
  --today-bg: #FFF0F0;
  --other-bg: #EBE9F3;
  --other-text: #C8C8D8;
  --green: #30BF78;
  --green-hover: #27A868;
  --green-light: #E8F9F0;
  --green-badge: #30BF78;
  --blue-badge: #7B9FE8;
  --blue-light: #EEF2FC;
  --blue-text: #4A6FD4;
  --red: #E05555;
  --orange: #F5A623;
  --orange-hover: #E09510;
  --orange-light: #FEF3E2;
  --orange-text: #B86E00;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  --radius: 8px;
  --radius-sm: 6px;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* ── CAL HEADER ── */
.cal-header-bar {
  background: var(--white);
  position: sticky;
  top: 0;
  z-index: 50;
}
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0;
  height: 56px;
  max-width: 920px;
  margin: 0 auto;
  padding: 0 32px;
}
.hbrand {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .03em;
  color: var(--ink);
}
.hbrand span { color: var(--muted); font-weight: 400; margin: 0 4px; }
.hbtns { display: flex; gap: 10px; align-items: center; }

.btn-primary {
  background: var(--green);
  color: var(--white);
  border: none;
  border-radius: 20px;
  padding: 9px 20px;
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background .15s;
  white-space: nowrap;
}
.btn-primary:hover { background: var(--green-hover); }
.btn-plus { display: none; }

.btn-secondary {
  background: var(--white);
  color: var(--dark);
  border: 1.5px solid #D8D8D8;
  border-radius: 20px;
  padding: 8px 16px;
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: border-color .15s;
  white-space: nowrap;
}
.btn-secondary:hover { border-color: #999; }
.btn-secondary svg { color: var(--muted); }

/* ── SUBHEADER ── */
.subheader {
  text-align: center;
  padding: 20px 32px 0;
  font-size: 13px;
  color: var(--dark);
  font-weight: 400;
}

/* ── CAL WRAP ── */
.cal-wrap {
  padding: 16px 32px 40px;
  max-width: 920px;
  margin: 0 auto;
}

/* ── NAV ── */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 20px;
}
.cal-title {
  font-size: 28px;
  font-weight: 300;
  color: var(--ink);
  min-width: 200px;
  text-align: center;
  letter-spacing: -.01em;
}
.nav-btn {
  background: var(--white);
  border: 1.5px solid #D8D8D8;
  border-radius: 50%;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--dark);
  font-size: 16px;
  transition: border-color .15s;
}
.nav-btn:hover { border-color: var(--dark); }

/* ── GRID ── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  border-radius: var(--radius);
  overflow: visible;
}

.dhead {
  background: var(--dark);
  color: var(--white);
  text-align: center;
  padding: 10px 4px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .04em;
}
.dhead:first-child { border-radius: var(--radius-sm) 0 0 0; }
.dhead:last-child { border-radius: 0 var(--radius-sm) 0 0; }

.dcell {
  background: var(--white);
  min-height: 88px;
  padding: 8px;
  position: relative;
  border-radius: var(--radius-sm);
  transition: background .12s;
  overflow: hidden;
}
.dcell.other {
  background: var(--bg);
}
.dcell.other .dnum { color: var(--other-text); }
.dcell.today { background: var(--today-bg); }

/* Number top-left */
.dnum {
  font-size: 12px;
  font-weight: 500;
  color: var(--dark);
  display: block;
  margin-bottom: 0;
}
.dcell.today .dnum { color: var(--red); font-weight: 600; }
.dcell.past .dnum { color: var(--light-text); }
.dcell.sel .dnum { color: var(--white); position: relative; z-index: 2; }

/* Badges — centered in cell */
.badges-row {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  z-index: 2;
  pointer-events: none;
}
.dot { pointer-events: auto; }
.dot {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--white);
  cursor: pointer;
  transition: transform .12s;
}
.dot:hover { transform: scale(1.1); }
.dot.web { background: var(--blue-badge); }
.dot.boutique { background: var(--green-badge); }
.dot.brunch { background: var(--orange); }

/* Selection bar — full cell */
.sel-bar {
  display: none;
  position: absolute;
  inset: 0;
  background: var(--dark);
  border-radius: var(--radius-sm);
  z-index: 1;
}
.dcell.sel .sel-bar { display: block; }

/* Hover desktop — gris clair */
.dcell:not(.other):not(.past):not(.sel):hover { background: #EDEDF4; cursor: pointer; }
.dcell:not(.other).past:hover { cursor: default; }

/* btn-cell-add — désactivé sur desktop */
.btn-cell-add { display: none !important; }

/* Hover btn + */
.btn-cell-add {
  position: absolute;
  bottom: 4px;
  left: 4px;
  right: 4px;
  height: 38px;
  background: var(--green);
  color: var(--white);
  border: none;
  border-radius: 6px;
  font-size: 18px;
  font-weight: 300;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background .12s;
  line-height: 1;
}
.btn-cell-add:hover { background: var(--green-hover); }
.dcell:not(.other):not(.past):hover .btn-cell-add { display: flex; }

/* SUBHEADER */
.cal-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
#subheader {
  font-size: 13px;
  color: var(--dark);
  font-weight: 400;
}
#syncTime {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  letter-spacing: .05em;
  text-transform: uppercase;
}
#statusbar { padding:10px 32px; font-size:11px; display:none; }
#statusbar.loading { display:block; background:#FFF9ED; color:var(--muted); }
#statusbar.error { display:block; background:#FFF0F0; color:var(--red); }

/* ADD-READY state (mobile: 1er tap case vide) */
.dcell.add-ready { background: #F0FAF4; }
.dcell.add-ready .btn-cell-add { display: flex; }

/* ── PANEL ── */
.panel {
  display: none;
  background: var(--dark);
  border-radius: var(--radius);
  margin-top: 4px;
  padding: 24px;
  animation: slideDown .2s ease;
}
.panel.on { display: block; }
@keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0;
}

.panel-date {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 0;
}

.btn-panel-add {
  background: var(--green);
  color: var(--white);
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s;
}
.btn-panel-add:hover { background: var(--green-hover); }

.panel-date {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 0;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
  padding-top: 16px;
}
.cards-hidden { display: none; }

/* ── CARD ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  animation: fadeUp .25s ease both;
  box-shadow: var(--shadow);
}

.card-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  margin-bottom: 10px;
}
.card-badge.web { background: var(--blue-light); color: var(--blue-text); }
.card-badge.boutique { background: var(--green-light); color: #2A8A52; }
.card-badge.brunch { background: var(--orange-light); color: var(--orange-text); }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}
.card-name { font-size: 15px; font-weight: 600; color: var(--ink); }
.card-amt { font-size: 14px; font-weight: 700; color: var(--ink); }

.crow { display: flex; gap: 12px; margin-bottom: 6px; align-items: flex-start; }
.clabel {
  font-size: 9px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); min-width: 58px; padding-top: 1px;
}
.cval { font-size: 12px; color: var(--ink); line-height: 1.5; }

.card-id { font-size: 9px; color: #CCC; margin-top: 8px; }

.btn-del {
  background: none; border: none;
  color: var(--red);
  font-size: 12px; font-weight: 500;
  font-family: 'Poppins', sans-serif;
  cursor: pointer; margin-top: 10px; display: block;
  padding: 0;
  transition: opacity .15s;
}
.btn-del:hover { opacity: .7; }

/* ── MODAL ── */
#modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: none; align-items: center; justify-content: center;
  z-index: 200;
  backdrop-filter: blur(2px);
}
#modal.on { display: flex; }

#modalBrunch {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: none; align-items: center; justify-content: center;
  z-index: 200;
  backdrop-filter: blur(2px);
}
#modalBrunch.on { display: flex; }

/* Select — same style as inputs */
.mfield select {
  width: 100%; background: #F8F8F8;
  border: 1.5px solid var(--border);
  border-radius: 6px; padding: 9px 12px;
  font-family: 'Poppins', sans-serif; font-size: 13px; color: var(--ink); outline: none;
  transition: border-color .15s; appearance: none;
}
.mfield select:focus { border-color: var(--orange); background: var(--white); }

/* Orange save button */
.mbtn-brunch { background: var(--orange) !important; }
.mbtn-brunch:hover { background: var(--orange-hover) !important; }

.mbox {
  background: var(--white);
  border-radius: 12px;
  padding: 32px;
  max-width: 480px; width: 90%;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-md);
  animation: fadeUp .2s ease;
}
.mtitle { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.msub { font-size: 12px; color: var(--muted); margin-bottom: 24px; }

.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
.mfield { margin-bottom: 14px; }
.mfield.full { grid-column: 1/-1; }
.mfield label {
  display: block; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); margin-bottom: 5px;
}
.mfield input {
  width: 100%; background: #F8F8F8;
  border: 1.5px solid var(--border);
  border-radius: 6px; padding: 9px 12px;
  font-family: 'Poppins', sans-serif; font-size: 13px; color: var(--ink); outline: none;
  transition: border-color .15s;
}
.mfield input:focus { border-color: var(--green); background: var(--white); }

.prow-header { display: grid; grid-template-columns: 1fr 1fr 56px 28px; gap: 8px; margin-bottom: 4px; }
.prow-header span { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.prow { display: grid; grid-template-columns: 1fr 1fr 56px 28px; gap: 8px; margin-bottom: 8px; align-items: center; }
.prow input { margin-bottom: 0; padding: 7px 10px; }
.btn-rmv { background: none; border: none; color: #CCC; font-size: 18px; cursor: pointer; transition: color .15s; }
.btn-rmv:hover { color: var(--red); }
.btn-addp {
  width: 100%; background: none;
  border: 1.5px dashed #D0D0D0; border-radius: 6px;
  color: var(--muted); padding: 8px;
  font-family: 'Poppins', sans-serif; font-size: 10px;
  font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  cursor: pointer; margin-top: 4px;
  transition: border-color .15s, color .15s;
}
.btn-addp:hover { border-color: var(--green); color: var(--green); }

.mbtns { display: flex; gap: 10px; margin-top: 20px; }
.mbtn-save {
  flex: 1; background: var(--green); color: var(--white);
  border: none; border-radius: 20px; padding: 12px;
  font-family: 'Poppins', sans-serif; font-size: 12px;
  font-weight: 700; cursor: pointer; transition: background .15s;
}
.mbtn-save:hover { background: var(--green-hover); }
.mbtn-cancel {
  background: var(--white); border: 1.5px solid #D8D8D8;
  border-radius: 20px; color: var(--dark); padding: 12px 20px;
  font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer;
  transition: border-color .15s;
}
.mbtn-cancel:hover { border-color: #999; }

/* ── RESPONSIVE ── */
@media(max-width: 768px) {

  /* Header */
  .cal-header { padding: 0 16px; height: 44px; }
  .hbrand { font-size: 12px; }
  .hbtns { gap: 8px; }
  .btn-primary {
    width: 28px; height: 28px; min-width: 28px;
    border-radius: 50%; padding: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .btn-primary svg { display: none; }
  .btn-primary .btn-label { display: none; }
  .btn-primary .btn-plus { display: flex; font-size: 20px; font-weight: 300; line-height: 1; }
  .btn-secondary {
    width: 28px; height: 28px; min-width: 28px;
    border-radius: 50%; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-secondary svg { width: 12px; height: 12px; }
  .btn-secondary .btn-label { display: none; }

  /* Cal wrap */
  .cal-wrap { padding: 12px 12px 32px; }

  /* Cal meta */
  .cal-meta { margin-bottom: 4px; }
  #subheader { font-size: 12px; }
  #syncTime { font-size: 10px; }

  /* Nav */
  .cal-title { font-size: 20px; }
  .cal-nav { gap: 16px; padding: 8px 0 14px; }

  /* Grid */
  .cal-grid { gap: 2px; }
  .dhead { padding: 8px 2px; font-size: 9px; letter-spacing: .02em; }
  .dcell { aspect-ratio: 1; min-height: unset; padding: 0; }
  .dnum { font-size: 10px; position: absolute; top: 2px; left: 4px; }

  /* Dots — responsive size */
  .dot { width: min(24px, calc((100% - 16px) / 2)); height: min(24px, calc((100% - 16px) / 2)); font-size: min(11px, 2.5vw); }

  /* 3 pastilles : chevauchement adaptatif */
  .badges-row.count-3 { gap: 0; }
  .badges-row.count-3 .dot:not(:first-child) { margin-left: max(-8px, min(-2px, calc(-1.5vw))); }

  /* Sel bar — smaller radius on mobile */
  .sel-bar { border-radius: 3px; }

  /* Panel */
  .panel { padding: 16px; border-radius: var(--radius); }
  .cards { grid-template-columns: 1fr; padding-top: 16px; }

  /* Modal */
  .mbox { padding: 24px 20px; }
  .mgrid { grid-template-columns: 1fr; }
  .prow,.prow-header { grid-template-columns: 1fr 1fr 50px 28px; }
}


</style>
</head>
<body>
<!-- HEADER -->
<!-- PASSWORD -->
<div id="spwd" style="display:none;position:fixed;inset:0;background:var(--dark);align-items:center;justify-content:center;z-index:200;flex-direction:column;">
  <div style="background:var(--white);border-radius:12px;padding:40px 32px;width:300px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3);">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px;">KUBO <span style="color:var(--muted);font-weight:400;">·</span> COMMANDES</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:24px;">Accès restreint</div>
    <input type="password" id="pwd" placeholder="Mot de passe"
      style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;outline:none;margin-bottom:8px;box-sizing:border-box;">
    <div id="pwdErr" style="font-size:11px;color:var(--red);min-height:16px;margin-bottom:8px;"></div>
    <button id="btnPwd" style="width:100%;background:var(--green);color:var(--white);border:none;border-radius:20px;padding:11px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">Accéder</button>
  </div>
</div>

<div id="statusbar"></div>

<div class="cal-header-bar">
  <div class="cal-header">
    <div class="hbrand">KUBO <span>·</span> COMMANDES</div>
    <div class="hbtns">
      <button class="btn-primary" id="btnNewOrder">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span class="btn-label">Nouvelle commande</span>
        <span class="btn-plus">+</span>
      </button>
      <button class="btn-secondary" id="btnRefresh">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span class="btn-label">Actualiser</span>
      </button>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div class="cal-wrap">
  <div class="cal-meta">
    <div id="subheader">— Commandes à venir</div>
    <div id="syncTime">SYNC 14:20</div>
  </div>
  <div class="cal-nav">
    <button class="nav-btn" id="btnPrev">‹</button>
    <div class="cal-title" id="calTitle"></div>
    <button class="nav-btn" id="btnNext">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="panel" id="panel"></div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="mbox">
    <div class="mtitle">Nouvelle commande</div>
    <div class="msub" id="modalSub">—</div>
    <div class="mgrid">
      <div class="mfield full">
        <label>Nom du client *</label>
        <input type="text" id="mName" placeholder="Prénom Nom">
      </div>
      <div class="mfield full">
        <label>Téléphone</label>
        <input type="tel" id="mPhone" placeholder="06 XX XX XX XX">
      </div>
      <div class="mfield full">
        <label>Produits *</label>
        <div id="mProdList"></div>
        <button class="btn-addp" id="btnAddProd">+ Ajouter un produit</button>
      </div>
      <div class="mfield">
        <label>Prix total (€)</label>
        <input type="number" id="mPrice" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="mfield">
        <label>Jour de retrait *</label>
        <input type="date" id="mDate">
      </div>
      <div class="mfield full">
        <label>Heure de retrait</label>
        <input type="time" id="mTime">
      </div>
    </div>
    <div class="mbtns">
      <button class="mbtn-cancel" id="btnModalCancel">Annuler</button>
      <button class="mbtn-save" id="btnModalSave">Enregistrer</button>
    </div>
  </div>
</div>

<!-- BRUNCH MODAL -->
<div id="modalBrunch">
  <div class="mbox">
    <div class="mtitle">Nouveau brunch</div>
    <div class="msub" id="brunchModalSub">—</div>
    <div class="mgrid">
      <div class="mfield full">
        <label>Nom du client *</label>
        <input type="text" id="bName" placeholder="Prénom Nom">
      </div>
      <div class="mfield full">
        <label>Téléphone</label>
        <input type="tel" id="bPhone" placeholder="06 XX XX XX XX">
      </div>
      <div class="mfield">
        <label>Nombre de personnes *</label>
        <input type="number" id="bPersons" min="1" placeholder="2">
      </div>
      <div class="mfield">
        <label>Heure *</label>
        <select id="bTime">
          <option value="">— Choisir —</option>
          <option value="10:30">10h30</option>
          <option value="12:00">12h00</option>
          <option value="13:30">13h30</option>
        </select>
      </div>
    </div>
    <input type="hidden" id="bDate">
    <div class="mbtns">
      <button class="mbtn-cancel" id="btnBrunchCancel">Annuler</button>
      <button class="mbtn-save mbtn-brunch" id="btnBrunchSave">Enregistrer</button>
    </div>
  </div>
</div>

<script>
var PWD = 'Miniloute2016';
var KUBO_SECRET = '';
var proxyUrl = '/api/orders';
var webOrders = [];
var boutiqueOrders = [];
var brunchOrders = [];
var calDate = new Date();
var selDate = null;

function boutiqueUrl() { return '/api/boutique'; }

function allOrders() {
  return webOrders.map(function(o) { return Object.assign({}, o, {source:'web'}); })
    .concat(boutiqueOrders)
    .concat(brunchOrders);
}

// ── AUTH ──
function checkPwd() {
  var input = document.getElementById('pwd');
  var err = document.getElementById('pwdErr');
  if (input.value === PWD) {
    sessionStorage.setItem('kubo_ok', '1');
    afterLogin();
  } else {
    input.classList.add('shake');
    err.textContent = 'Mot de passe incorrect';
    input.value = '';
    setTimeout(function() { input.classList.remove('shake'); err.textContent = ''; }, 1500);
  }
}

function afterLogin() {
  KUBO_SECRET = document.getElementById('pwd') ? document.getElementById('pwd').value : sessionStorage.getItem('kubo_secret') || '';
  sessionStorage.setItem('kubo_secret', KUBO_SECRET);
  document.getElementById('spwd').style.display = 'none';
  renderCal();
  loadWeb();
  loadBoutique();
}

// ── STATUS ──
function status(type, msg) {
  var b = document.getElementById('statusbar');
  b.className = type || '';
  b.innerHTML = msg;
  b.style.display = type ? 'block' : 'none';
}

// ── LOAD WEB ──
function loadWeb() {
  status('loading', 'Chargement des commandes...');
  fetch(proxyUrl)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var allParsed = parseWeb(d.orders || []);
      var brunchParsed = parseBrunch(d.orders || []);
      webOrders = allParsed;
      brunchOrders = brunchParsed;
      renderCal();
      status('', '');
      document.getElementById('syncTime').textContent =
        'Sync ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    })
    .catch(function(e) { status('error', 'Erreur : ' + e.message); });
}


function parseBrunch(raw) {
  var months = {janvier:1,février:2,mars:3,avril:4,mai:5,juin:6,juillet:7,août:8,septembre:9,octobre:10,novembre:11,décembre:12};
  return raw.map(function(o) {
    var variant = '';
    var items = (o.purchasedItems || []);
    var isBrunch = items.some(function(it){ return (it.productName||'').toLowerCase().indexOf('brunch') !== -1; });
    if (!isBrunch) return null;
    items.forEach(function(it) { if (it.variantName) variant = it.variantName; });
    // Parse "Samedi 7 mars" → dateKey
    var dateKey = null;
    var m = variant.match(/(\d{1,2})\s+(\w+)/i);
    if (m) {
      var day = parseInt(m[1]);
      var monthNum = months[m[2].toLowerCase()];
      if (monthNum) {
        var yr = new Date().getFullYear();
        dateKey = yr + '-' + String(monthNum).padStart(2,'0') + '-' + String(day).padStart(2,'0');
      }
    }
    if (!dateKey) return null;
    var ci = o.customerInfo || {};
    var addr = (o.allAddresses||[])[0]||{};
    var total = o.customerPaid && o.customerPaid.value !== undefined
      ? (o.customerPaid.value/100).toFixed(2)+'€' : '—';
    var timeMatch = variant.match(/(\d{1,2}[h:]\d{2})/i);
    return {
      id: o.orderId || o.id || '',
      source: 'brunch',
      client: ci.fullName || 'Client',
      email: ci.email || '',
      phone: addr.phone || '',
      products: [{ name: 'Brunch du samedi', size: variant, qty: 1 }],
      total: total,
      dateKey: dateKey,
      pickupTime: timeMatch ? timeMatch[1] : null,
      persons: null
    };
  }).filter(Boolean);
}

function parseWeb(raw) {
  return raw.map(function(o) {
    var pickupDate = null;
    var fields = o.customData || [];
    if (Array.isArray(fields)) {
      for (var i = 0; i < fields.length; i++) {
        if (fields[i].textInput) { pickupDate = fields[i].textInput; break; }
      }
    }
    var dateKey = null;
    if (pickupDate) {
      var m = pickupDate.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
      if (m) dateKey = m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
    }
    var timeMatch = pickupDate ? pickupDate.match(/(\d{1,2}:\d{2})/) : null;
    var items = (o.purchasedItems || []).map(function(it) {
      return { name: it.productName || 'Produit', size: it.variantName || '', qty: it.count || 1 };
    });
    var ci = o.customerInfo || {};
    var addr = (o.allAddresses || [])[0] || {};
    var total = o.customerPaid && o.customerPaid.value !== undefined
      ? (o.customerPaid.value/100).toFixed(2)+'€' : '—';
    return {
      id: o.orderId || o.id || '',
      source: 'web',
      client: ci.fullName || 'Client',
      email: ci.email || '',
      phone: addr.phone || '',
      products: items,
      total: total,
      dateKey: dateKey,
      pickupTime: timeMatch ? timeMatch[1] : null,
      status: o.status || ''
    };
  }).filter(function(o) { return o.dateKey && !(o.products && o.products[0] && (o.products[0].name||'').toLowerCase().indexOf('brunch') !== -1); });
}

// ── LOAD BOUTIQUE ──
function loadBoutique() {
  fetch(boutiqueUrl())
    .then(function(r) { return r.json(); })
    .then(function(d) {
      boutiqueOrders = d.orders || [];
      renderCal();
    })
    .catch(function(e) { console.warn('Boutique:', e.message); });
}

// ── STATS ──
function updateSubheader() {
  var today = new Date().toISOString().split('T')[0];
  var count = allOrders().filter(function(o){ return o.dateKey >= today; }).length;
  document.getElementById('subheader').textContent = count + ' Commande' + (count > 1 ? 's' : '') + ' à venir';
}

// ── CALENDAR ──
function renderCal() {
  var grid = document.getElementById('calGrid');
  var yr = calDate.getFullYear();
  var mo = calDate.getMonth();

  document.getElementById('calTitle').textContent =
    new Date(yr, mo, 1).toLocaleDateString('fr-FR', {month:'long', year:'numeric'})
      .replace(/^./, s => s.toUpperCase());

  var byDate = {};
  allOrders().forEach(function(o) {
    if (!byDate[o.dateKey]) byDate[o.dateKey] = [];
    byDate[o.dateKey].push(o);
  });

  var days = ['lun','mar','mer','jeu','ven','sam','dim'];
  var html = days.map(function(d, i) {
    var r = i === 0 ? 'border-radius:6px 0 0 0' : i === 6 ? 'border-radius:0 6px 0 0' : '';
    return '<div class="dhead" style="'+r+'">'+d+'</div>';
  }).join('');

  var dow = new Date(yr, mo, 1).getDay();
  dow = dow === 0 ? 6 : dow - 1;
  var lastDay = new Date(yr, mo + 1, 0).getDate();
  var prevLast = new Date(yr, mo, 0).getDate();
  var today = new Date().toISOString().split('T')[0];

  for (var i = dow - 1; i >= 0; i--)
    html += '<div class="dcell other"><span class="dnum">' + (prevLast - i) + '</span></div>';

  for (var d = 1; d <= lastDay; d++) {
    var ds = yr + '-' + String(mo + 1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var ords = byDate[ds] || [];
    var isSel = ds === selDate;
    var cls = 'dcell' + (ds === today ? ' today' : '') + (ds < today ? ' past' : '') + (isSel ? ' sel' : '');

    var dotsHtml = '';
    if (ords.length) {
      var webCount  = ords.filter(function(o){ return o.source === 'web'; }).length;
      var boutCount = ords.filter(function(o){ return o.source === 'boutique'; }).length;
      var brunchCount = ords.filter(function(o){ return o.source === 'brunch'; }).length;
      var dotCount = (webCount ? 1 : 0) + (boutCount ? 1 : 0) + (brunchCount ? 1 : 0);
      dotsHtml = '<div class="badges-row' + (dotCount === 3 ? ' count-3' : '') + '">';
      if (webCount)    dotsHtml += '<div class="dot web">'     + webCount    + '</div>';
      if (boutCount)   dotsHtml += '<div class="dot boutique">'+ boutCount   + '</div>';
      if (brunchCount) dotsHtml += '<div class="dot brunch">'  + brunchCount + '</div>';
      dotsHtml += '</div>';
    }

    var selBarHtml = isSel ? '<div class="sel-bar"></div>' : '';

    html += '<div class="' + cls + '" data-d="' + ds + '">'
      + '<span class="dnum">' + d + '</span>'
      + dotsHtml
      + selBarHtml
      + '<button class="btn-cell-add" data-d="' + ds + '">+</button>'
      + '</div>';
  }

  var total = dow + lastDay;
  var rem = Math.ceil(total / 7) * 7 - total;
  for (var d2 = 1; d2 <= rem; d2++)
    html += '<div class="dcell other"><span class="dnum">' + d2 + '</span></div>';

  grid.innerHTML = html;

  var isMobile = window.innerWidth <= 768;

  // Click on cell
  grid.querySelectorAll('.dcell:not(.other)').forEach(function(c) {
    c.addEventListener('click', function(e) {
      if (e.target.classList.contains('btn-cell-add')) return;
      var ds2 = c.getAttribute('data-d');
      if (!ds2) return;
      var dayOrds = byDate[ds2] || [];
      var isPast = ds2 < today;

      if (isMobile) {
        // Case passée sans commande → rien
        if (isPast && !dayOrds.length) return;
        // Deselect si déjà sélectionné
        if (selDate === ds2) {
          selDate = null;
          document.getElementById('panel').classList.remove('on');
          renderCal(); return;
        }
        // Tout tap ouvre le panel (case vide ou avec commandes)
        selDate = ds2;
        renderCal();
        renderPanel(ds2, dayOrds);
        setTimeout(function() { document.getElementById('panel').scrollIntoView({ behavior:'smooth', block:'nearest' }); }, 100);
        return;
      }

      // Desktop — même comportement que mobile
      if (isPast && !dayOrds.length) return;
      if (selDate === ds2) {
        selDate = null;
        document.getElementById('panel').classList.remove('on');
        renderCal(); return;
      }
      selDate = ds2;
      renderCal();
      renderPanel(ds2, dayOrds);
    });
  });

  // Tap ailleurs → retire add-ready
  document.addEventListener('click', function(e) {
    if (!e.target.closest || !e.target.closest('.dcell')) {
      grid.querySelectorAll('.add-ready').forEach(function(x) { x.classList.remove('add-ready'); });
    }
  });

  // Click + button → open modal (only future/today)
  grid.querySelectorAll('.btn-cell-add').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var d = btn.getAttribute('data-d');
      if (d < today) return;
      openModal(d);
    });
  });

  updateSubheader();

  if (selDate && byDate[selDate]) {
    renderPanel(selDate, byDate[selDate]);
  }
}

function renderPanel(ds, ords) {
  var panel = document.getElementById('panel');
  var isMobile = window.innerWidth <= 768;
  var today = new Date().toISOString().split('T')[0];
  var isPast = ds < today;
  var label = new Date(ds + 'T12:00:00').toLocaleDateString('fr-FR', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
  label = label.charAt(0).toUpperCase() + label.slice(1);

  var showAddBtn = !isPast;
  var isSaturday = new Date(ds + 'T12:00:00').getDay() === 6;

  var panelHeader = '<div class="panel-header">'
    + '<div class="panel-date">' + label + (ords.length ? ' — ' + ords.length + ' commande' + (ords.length > 1 ? 's' : '') : '') + '</div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">'
    + (showAddBtn ? '<button class="btn-panel-add" id="btnPanelAdd">+ Nouvelle commande</button>' : '')
    + (showAddBtn && isSaturday ? '<button class="btn-panel-add" id="btnPanelBrunch" style="background:var(--orange);">+ Nouveau brunch</button>' : '')
    + '</div>'
    + '</div>';

  var html = panelHeader;
  html += '<div class="cards' + (!ords.length ? ' cards-hidden' : '') + '">';

  ords.forEach(function(o, i) {
    var isB = o.source === 'boutique';
    var isBrunch = o.source === 'brunch';
    var badgeLabel = isB ? 'Boutique' : isBrunch ? 'Brunch' : 'Site web';
    var badgeClass = isB ? 'boutique' : isBrunch ? 'brunch' : 'web';
    html += '<div class="card" style="animation-delay:' + (i * .07) + 's">';
    html += '<span class="card-badge ' + badgeClass + '">' + badgeLabel + '</span>';
    html += '<div class="card-header"><div class="card-name">' + o.client + '</div><div class="card-amt">' + o.total + '</div></div>';
    if (o.products && o.products.length) {
      var pl = o.products.map(function(p) {
        return typeof p === 'object' ? p.qty + '× ' + p.name + (p.size ? ' (' + p.size + ')' : '') : p;
      }).join('<br>');
      html += '<div class="crow"><div class="clabel">Produits</div><div class="cval">' + pl + '</div></div>';
    }
    if (o.persons) html += '<div class="crow"><div class="clabel">Personnes</div><div class="cval">' + o.persons + '</div></div>';
    if (o.pickupTime) html += '<div class="crow"><div class="clabel">Heure</div><div class="cval">' + o.pickupTime + '</div></div>';
    if (o.email) html += '<div class="crow"><div class="clabel">Email</div><div class="cval">' + o.email + '</div></div>';
    if (o.phone) html += '<div class="crow"><div class="clabel">Tél.</div><div class="cval">' + o.phone + '</div></div>';
    html += '<div class="card-id">#' + o.id + '</div>';
    if (isB || isBrunch) html += '<button class="btn-del" data-id="' + o.id + '">Supprimer</button>';
    html += '</div>';
  });

  html += '</div>';
  panel.innerHTML = html;

  var addBtn = panel.querySelector('#btnPanelAdd');
  if (addBtn) addBtn.addEventListener('click', function() { openModal(ds); });

  var brunchBtn = panel.querySelector('#btnPanelBrunch');
  if (brunchBtn) brunchBtn.addEventListener('click', function() { openBrunchModal(ds); });

  panel.querySelectorAll('.btn-del').forEach(function(b) {
    b.addEventListener('click', function() {
      if (!confirm('Supprimer cette commande ?')) return;
      var id = b.getAttribute('data-id');
      fetch(boutiqueUrl(), {method:'DELETE', headers:{'Content-Type':'application/json','x-kubo-secret':KUBO_SECRET}, body:JSON.stringify({id:id})})
        .then(function(r) {
          if (!r.ok) throw new Error('Erreur serveur ' + r.status);
          return r.json();
        })
        .then(function() {
          boutiqueOrders = boutiqueOrders.filter(function(o) { return o.id !== id; });
          selDate = null;
          panel.classList.remove('on');
          renderCal();
        })
        .catch(function(e) { alert('Erreur: ' + e.message); });
    });
  });
  panel.classList.add('on');
  setTimeout(function() { panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
}

function changeMonth(dir) {
  selDate = null;
  calDate.setMonth(calDate.getMonth() + dir);
  document.getElementById('panel').classList.remove('on');
  renderCal();
}

// ── MODAL ──
function openModal(dateStr) {
  document.getElementById('mName').value = '';
  document.getElementById('mPhone').value = '';
  document.getElementById('mPrice').value = '';
  document.getElementById('mTime').value = '';
  document.getElementById('mDate').value = dateStr || '';
  document.getElementById('mProdList').innerHTML = '';
  document.getElementById('modalSub').textContent = dateStr
    ? 'Retrait : ' + new Date(dateStr + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'})
    : 'Nouvelle commande';
  addProdRow();
  document.getElementById('modal').classList.add('on');
  setTimeout(function() { document.getElementById('mName').focus(); }, 100);
}

function closeModal() { document.getElementById('modal').classList.remove('on'); }

function addProdRow(name, size, qty) {
  var list = document.getElementById('mProdList');
  if (!list.querySelector('.prow')) {
    var h = document.createElement('div'); h.className = 'prow-header';
    h.innerHTML = '<span>Produit</span><span>Taille</span><span>Qté</span><span></span>';
    list.appendChild(h);
  }
  var row = document.createElement('div'); row.className = 'prow';
  var n = document.createElement('input'); n.type='text'; n.className='p-name'; n.placeholder='Nom'; if(name) n.value=name;
  var s = document.createElement('input'); s.type='text'; s.className='p-size'; s.placeholder='Taille'; if(size) s.value=size;
  var q = document.createElement('input'); q.type='number'; q.className='p-qty'; q.min='1'; q.value=qty||1;
  var del = document.createElement('button'); del.type='button'; del.className='btn-rmv'; del.textContent='×';
  del.addEventListener('click', function() {
    row.remove();
    if (!list.querySelector('.prow')) list.innerHTML = '';
  });
  row.appendChild(n); row.appendChild(s); row.appendChild(q); row.appendChild(del);
  list.appendChild(row);
}

function getProds() {
  var out = [];
  document.querySelectorAll('#mProdList .prow').forEach(function(r) {
    var name = r.querySelector('.p-name').value.trim();
    if (name) out.push({ name, size: r.querySelector('.p-size').value.trim(), qty: parseInt(r.querySelector('.p-qty').value)||1 });
  });
  return out;
}

function saveModal() {
  var name = document.getElementById('mName').value.trim();
  var date = document.getElementById('mDate').value;
  if (!name) { alert('Nom requis'); return; }
  if (!date) { alert('Date requise'); return; }
  if (date < new Date().toISOString().split('T')[0]) { alert('Impossible de créer une commande dans le passé.'); return; }
  var prods = getProds();
  if (!prods.length) { alert('Au moins un produit requis'); return; }
  var price = document.getElementById('mPrice').value;
  var order = {
    id: 'b-' + Date.now(), source: 'boutique', client: name,
    phone: document.getElementById('mPhone').value.trim(),
    products: prods,
    total: price ? parseFloat(price).toFixed(2) + '€' : '—',
    dateKey: date,
    pickupTime: document.getElementById('mTime').value || null,
    email: '', status: ''
  };
  fetch(boutiqueUrl(), {method:'POST', headers:{'Content-Type':'application/json', 'x-kubo-secret': KUBO_SECRET}, body:JSON.stringify(order)})
    .then(function(r) {
      if (!r.ok) throw new Error('Erreur serveur ' + r.status);
      return r.json();
    })
    .then(function() {
      boutiqueOrders.push(order);
      closeModal();
      selDate = date;
      renderCal();
      var byDate = {};
      allOrders().forEach(function(o) { if (!byDate[o.dateKey]) byDate[o.dateKey]=[]; byDate[o.dateKey].push(o); });
      if (byDate[date]) renderPanel(date, byDate[date]);
    })
    .catch(function(e) { alert('Erreur: ' + e.message); });
}

// ── EVENTS ──
document.getElementById('btnPrev').addEventListener('click', function() { changeMonth(-1); });
document.getElementById('btnNext').addEventListener('click', function() { changeMonth(1); });
document.getElementById('btnNewOrder').addEventListener('click', function() { openModal(null); });
document.getElementById('btnRefresh').addEventListener('click', function() {
  var btn = document.getElementById('btnRefresh');
  btn.style.opacity = '.5';
  loadWeb();
  loadBoutique();
  setTimeout(function() { btn.style.opacity = '1'; }, 800);
});
document.getElementById('btnAddProd').addEventListener('click', function() { addProdRow(); });
document.getElementById('btnModalCancel').addEventListener('click', closeModal);
document.getElementById('btnModalSave').addEventListener('click', saveModal);
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.getElementById('btnPwd').addEventListener('click', checkPwd);
document.getElementById('pwd').addEventListener('keydown', function(e) { if(e.key==='Enter') checkPwd(); });


document.getElementById('btnBrunchCancel').addEventListener('click', closeBrunchModal);
document.getElementById('btnBrunchSave').addEventListener('click', saveBrunchModal);
document.getElementById('modalBrunch').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modalBrunch')) closeBrunchModal();
});

function openBrunchModal(dateStr) {
  document.getElementById('bName').value = '';
  document.getElementById('bPhone').value = '';
  document.getElementById('bPersons').value = '';
  document.getElementById('bTime').value = '';
  document.getElementById('bDate').value = dateStr || '';
  var sub = dateStr ? new Date(dateStr + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}) : '';
  document.getElementById('brunchModalSub').textContent = sub ? sub.charAt(0).toUpperCase() + sub.slice(1) : '—';
  document.getElementById('modalBrunch').classList.add('on');
  setTimeout(function() { document.getElementById('bName').focus(); }, 100);
}

function closeBrunchModal() {
  document.getElementById('modalBrunch').classList.remove('on');
}

function saveBrunchModal() {
  var name = document.getElementById('bName').value.trim();
  var date = document.getElementById('bDate').value;
  var persons = document.getElementById('bPersons').value;
  var time = document.getElementById('bTime').value;
  if (!name) { alert('Nom requis'); return; }
  if (!persons || persons < 1) { alert('Nombre de personnes requis'); return; }
  if (!time) { alert('Heure requise'); return; }
  var order = {
    id: 'br-' + Date.now(), source: 'brunch', client: name,
    phone: document.getElementById('bPhone').value.trim(),
    persons: parseInt(persons),
    products: [{ name: 'Brunch du samedi', size: '', qty: parseInt(persons) }],
    total: '—', dateKey: date, pickupTime: time, email: ''
  };
  fetch(boutiqueUrl(), {method:'POST', headers:{'Content-Type':'application/json','x-kubo-secret':KUBO_SECRET}, body:JSON.stringify(order)})
    .then(function(r) {
      if (!r.ok) throw new Error('Erreur serveur ' + r.status);
      return r.json();
    })
    .then(function() {
      boutiqueOrders.push(order);
      closeBrunchModal();
      selDate = date;
      renderCal();
      var byDate = {};
      allOrders().forEach(function(o){ if(!byDate[o.dateKey]) byDate[o.dateKey]=[]; byDate[o.dateKey].push(o); });
      if (byDate[date]) renderPanel(date, byDate[date]);
    })
    .catch(function(e) { alert('Erreur: ' + e.message); });
}

if (sessionStorage.getItem('kubo_ok') === '1') {
  KUBO_SECRET = sessionStorage.getItem('kubo_secret') || '';
  afterLogin();
} else {
  document.getElementById('spwd').style.display = 'flex';
}
</script>

</body>
